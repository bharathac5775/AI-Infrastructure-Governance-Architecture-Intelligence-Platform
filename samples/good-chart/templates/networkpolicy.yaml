{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "good-chart.fullname" . }}
  labels:
    {{- include "good-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "good-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressFromNamespaces }}
      from:
        {{- range .Values.networkPolicy.ingressFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound HTTPS (external APIs, secrets managers, etc.)
    - ports:
        - port: 443
          protocol: TCP
{{- end }}
