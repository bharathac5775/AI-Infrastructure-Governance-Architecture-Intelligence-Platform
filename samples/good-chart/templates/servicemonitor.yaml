{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "good-chart.fullname" . }}
  labels:
    {{- include "good-chart.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "good-chart.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.monitoring.metricsPath }}
      interval: {{ .Values.monitoring.scrapeInterval }}
      scheme: http
{{- end }}
